kind = "web"
previewPath = "/"
title = "Creator Toolbox"
version = "1.0.0"
id = "artifacts/creator-toolbox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24051
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/creator-toolbox run dev"

[services.env]
PORT = "24051"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/creator-toolbox", "run", "build"]
publicDir = "artifacts/creator-toolbox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
